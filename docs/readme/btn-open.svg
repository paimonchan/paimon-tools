<svg xmlns="http://www.w3.org/2000/svg" width="210" height="50" viewBox="0 0 210 50" fill="none">
  <defs>
    <linearGradient id="honey" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eec35a"/>
      <stop offset="0.55" stop-color="#e7ac34"/>
      <stop offset="1" stop-color="#d9911e"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- base -->
  <rect width="210" height="50" rx="12" fill="url(#honey)"/>
  <!-- top sheen for depth -->
  <rect width="210" height="50" rx="12" fill="url(#sheen)"/>
  <!-- play icon -->
  <path d="M26 17 L26 33 L38 25 Z" fill="#131110"/>
  <!-- label -->
  <text x="122" y="32" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#131110" text-anchor="middle">Open the App</text>
